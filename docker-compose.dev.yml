services:
  postgres:
    image: postgres:17.4-alpine
    container_name: eyemotiondetect
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: gaze_dev
      POSTGRES_USER: gaze
      POSTGRES_PASSWORD: gaze_dev_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:9.3
    container_name: eyemotiondetect-pgadmin
    depends_on:
      - postgres
    ports: ["5050:80"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eyemotiondetect.dev
      PGADMIN_DEFAULT_PASSWORD: admin123456
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    restart: unless-stopped

volumes:
  pgdata:
  pgadmin-data:
